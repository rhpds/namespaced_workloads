---
- name: Set Troshka route URL and requester identity
  ansible.builtin.set_fact:
    _troshka_api: "https://{{ _troshka_route_host }}/api/v1"

- name: Get backend pod name
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: "{{ troshka_namespace }}"
    label_selectors:
      - app.kubernetes.io/name=troshka-backend
    field_selectors:
      - status.phase=Running
  register: _backend_pods
  until: _backend_pods.resources | length > 0
  retries: 30
  delay: 10

- name: Set backend pod name
  ansible.builtin.set_fact:
    _backend_pod: "{{ _backend_pods.resources[0].metadata.name }}"

- name: Wait for backend health
  kubernetes.core.k8s_exec:
    namespace: "{{ troshka_namespace }}"
    pod: "{{ _backend_pod }}"
    container: backend
    command: curl -sf http://localhost:8200/api/v1/health
  register: _health
  until: _health.return_code == 0
  retries: 30
  delay: 10
  ignore_errors: true

- name: Get cluster API URL
  ansible.builtin.set_fact:
    _cluster_api_url: >-
      {{ sandbox_openshift_api_url | default(lookup('env', 'K8S_AUTH_HOST')) }}

- name: Build provider registration payload
  ansible.builtin.set_fact:
    _provider_payload: >-
      {"name":"Local OCP Virt","type":"ocpvirt",
      "default_region":"{{ troshka_namespace }}",
      "default_image":"rhel10",
      "token":"{{ _troshka_sa_token }}",
      "namespace":"{{ troshka_namespace }}",
      "api_url":"{{ _cluster_api_url }}"}

- name: Register OCP Virt provider
  kubernetes.core.k8s_exec:
    namespace: "{{ troshka_namespace }}"
    pod: "{{ _backend_pod }}"
    container: backend
    command: >-
      curl -sf -X POST http://localhost:8200/api/v1/providers/
      -H "Content-Type: application/json"
      -H "X-Forwarded-Email: {{ _requester_identity }}"
      -d '{{ _provider_payload }}'
  register: _provider_result
  failed_when: _provider_result.return_code != 0

- name: Parse provider response
  ansible.builtin.set_fact:
    _provider_id: "{{ (_provider_result.stdout | from_json).id }}"

- name: Build S4 provider payload
  ansible.builtin.set_fact:
    _s4_provider_payload: >-
      {"name":"Local S4","type":"s3",
      "credentials":{
      "endpoint_url":"{{ troshka_s4_endpoint }}",
      "access_key_id":"{{ _s4_access_key }}",
      "secret_access_key":"{{ _s4_secret_key }}",
      "bucket":"{{ troshka_s4_bucket }}",
      "region":"us-east-1"}}

- name: Register S4 storage provider
  kubernetes.core.k8s_exec:
    namespace: "{{ troshka_namespace }}"
    pod: "{{ _backend_pod }}"
    container: backend
    command: >-
      curl -sf -X POST http://localhost:8200/api/v1/providers/
      -H "Content-Type: application/json"
      -H "X-Forwarded-Email: {{ _requester_identity }}"
      -d '{{ _s4_provider_payload }}'
  register: _s4_provider_result
  failed_when: _s4_provider_result.return_code != 0

- name: Build host creation payload
  ansible.builtin.set_fact:
    _host_payload: >-
      {"provider_id":"{{ _provider_id }}",
      "name":"dedicated-host",
      "instance_type":"{{ troshka_host_vcpus }}c-{{ troshka_host_memory_gb }}g",
      "disk_gb":{{ troshka_host_disk_gb }}}

- name: Create agent host
  kubernetes.core.k8s_exec:
    namespace: "{{ troshka_namespace }}"
    pod: "{{ _backend_pod }}"
    container: backend
    command: >-
      curl -sf -X POST http://localhost:8200/api/v1/hosts/
      -H "Content-Type: application/json"
      -H "X-Forwarded-Email: {{ _requester_identity }}"
      -d '{{ _host_payload }}'
  register: _host_result
  failed_when: _host_result.return_code != 0

- name: Parse host response
  ansible.builtin.set_fact:
    _host_id: "{{ (_host_result.stdout | from_json).id }}"

- name: Wait for host to connect
  kubernetes.core.k8s_exec:
    namespace: "{{ troshka_namespace }}"
    pod: "{{ _backend_pod }}"
    container: backend
    command: >-
      curl -sf http://localhost:8200/api/v1/hosts/{{ _host_id }}
      -H "X-Forwarded-Email: {{ _requester_identity }}"
  register: _host_status
  until: (_host_status.stdout | from_json).agent_status == "connected"
  retries: 80
  delay: 15

- name: Set user info for catalog UI
  agnosticd.core.agnosticd_user_info:
    data:
      troshka_url: "https://{{ _troshka_route_host }}"
    msg: |-
      Troshka URL: https://{{ _troshka_route_host }}
      Login with your SSO credentials.
  tags: [user_info]
