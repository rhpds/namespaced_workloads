---
- name: Create ServiceAccount
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: troshka-sa
        namespace: "{{ troshka_namespace }}"

- name: Create Role for Troshka provider
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: troshka-provider
        namespace: "{{ troshka_namespace }}"
      rules:
        - apiGroups: ["kubevirt.io"]
          resources: ["virtualmachines", "virtualmachineinstances"]
          verbs: ["get", "list", "create", "delete", "patch", "update"]
        - apiGroups: ["cdi.kubevirt.io"]
          resources: ["datavolumes"]
          verbs: ["get", "list", "create", "delete"]
        - apiGroups: [""]
          resources: ["services", "persistentvolumeclaims"]
          verbs: ["get", "list", "create", "delete", "patch", "update"]
        - apiGroups: [""]
          resources: ["secrets"]
          verbs: ["get", "list", "create", "delete"]
        - apiGroups: ["route.openshift.io"]
          resources: ["routes"]
          verbs: ["get", "list", "create", "delete", "patch", "update"]
        - apiGroups: [""]
          resources: ["pods"]
          verbs: ["get", "list"]
        - apiGroups: [""]
          resources: ["pods/exec"]
          verbs: ["create"]

- name: Create RoleBinding
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: troshka-provider
        namespace: "{{ troshka_namespace }}"
      subjects:
        - kind: ServiceAccount
          name: troshka-sa
          namespace: "{{ troshka_namespace }}"
      roleRef:
        kind: Role
        name: troshka-provider
        apiGroup: rbac.authorization.k8s.io

- name: Get SA token for provider registration
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: troshka-sa-token
        namespace: "{{ troshka_namespace }}"
        annotations:
          kubernetes.io/service-account.name: troshka-sa
      type: kubernetes.io/service-account-token
  register: _sa_token_secret

- name: Wait for SA token to be populated
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: troshka-sa-token
    namespace: "{{ troshka_namespace }}"
  register: _sa_token_info
  until: _sa_token_info.resources[0].data.token is defined
  retries: 10
  delay: 5

- name: Store SA token
  ansible.builtin.set_fact:
    _troshka_sa_token: "{{ _sa_token_info.resources[0].data.token | b64decode }}"

- name: Create S3 credentials secret for CDI
  when: troshka_seed_s3_endpoint | default('') != ''
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: central-s4-creds
        namespace: "{{ troshka_namespace }}"
      type: Opaque
      stringData:
        accessKeyId: "{{ troshka_seed_s3_access_key }}"
        secretKey: "{{ troshka_seed_s3_secret_key }}"

- name: Create RHEL 10.2 DVD ISO DataVolume from central S4
  when: troshka_seed_s3_endpoint | default('') != ''
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cdi.kubevirt.io/v1beta1
      kind: DataVolume
      metadata:
        name: rhel-10.2-dvd-iso
        namespace: "{{ troshka_namespace }}"
      spec:
        source:
          s3:
            url: "{{ troshka_seed_s3_endpoint }}/{{ troshka_seed_s3_bucket }}/rhel-10.2-x86_64-dvd.iso"
            secretRef: central-s4-creds
        storage:
          volumeMode: Filesystem
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 12Gi
          storageClassName: ocs-storagecluster-ceph-rbd-virtualization
